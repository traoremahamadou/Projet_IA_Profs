<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AI SignTranslator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <h1 class="text-3xl font-black text-emerald-400 mb-4">AI SignTranslator - LSF/Bambara</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-5xl">
        <div class="bg-black rounded-2xl overflow-hidden border-4 border-slate-700">
            <video id="webcam" class="w-full h-auto scale-x-[-1]" autoplay muted playsinline></video>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <div id="status" class="text-xl font-bold mb-4">Système prêt : Entraînez un signe</div>
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="text" id="signName" placeholder="Nom du signe (ex: Bonjour)" class="bg-slate-900 p-2 rounded border border-slate-600 col-span-2">
                <button onclick="trainSign()" class="bg-purple-600 py-2 rounded font-bold">Apprendre ce signe</button>
                <button onclick="startPredicting()" class="bg-emerald-600 py-2 rounded font-bold">Démarrer Traduction</button>
            </div>

            <div id="resultBox" class="mt-6 p-4 bg-slate-950 rounded-xl border border-emerald-500 text-center">
                <p id="bambaraText" class="text-2xl font-bold text-emerald-400">---</p>
            </div>
        </div>
    </div>

    <script>
        const classifier = knnClassifier.create();
        let detector;
        let isPredicting = false;

        async function init() {
            const video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            detector = await handPoseDetection.createDetector(handPoseDetection.SupportedModels.MediaPipeHands, { runtime: 'tfjs' });
        }

        async function trainSign() {
            const label = document.getElementById('signName').value;
            if (!label) return alert("Donnez un nom au signe");
            
            const hands = await detector.estimateHands(document.getElementById('webcam'));
            if (hands.length > 0) {
                const landmarks = tf.tensor(hands[0].keypoints.map(kp => [kp.x, kp.y]));
                classifier.addExample(landmarks, label);
                document.getElementById('status').innerText = "Signe '" + label + "' appris !";
            }
        }

        async function startPredicting() {
            isPredicting = true;
            predictLoop();
        }

        async function predictLoop() {
            if (!isPredicting) return;
            const hands = await detector.estimateHands(document.getElementById('webcam'));
            
            if (hands.length > 0) {
                const landmarks = tf.tensor(hands[0].keypoints.map(kp => [kp.x, kp.y]));
                const result = await classifier.predictClass(landmarks);
                
                if (result.confidences[result.label] > 0.8) {
                    const dict = { "Bonjour": "I ni sogoma", "Merci": "I ni ce" };
                    const trad = dict[result.label] || result.label;
                    document.getElementById('bambaraText').innerText = trad;
                    
                    // Parole
                    const msg = new SpeechSynthesisUtterance(trad);
                    msg.lang = 'fr-FR'; // Utiliser FR car la synthèse Bambara est rare
                    window.speechSynthesis.speak(msg);
                }
            }
            requestAnimationFrame(predictLoop);
        }

        init();
    </script>
</body>
</html>
